name: Runtime bug report
description: Report a codex-web compatibility or runtime failure
title: "[runtime] "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe what failed and what you expected.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: ChatGPT/Codex desktop version
  - type: input
    id: cli-version
    attributes:
      label: Codex CLI version
  - type: textarea
    id: deployment
    attributes:
      label: Deployment details
      description: Include reverse-proxy path, operating system, Node version, and app-server mode.
