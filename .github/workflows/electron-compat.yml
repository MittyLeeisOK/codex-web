name: Electron compatibility

on:
  pull_request:
  push:
    branches:
      - main
      - agent/fix-electron-web-compat

jobs:
  electron-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build:server
      - run: npm run test:electron-compat
